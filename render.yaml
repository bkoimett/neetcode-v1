services:
  - type: web
    name: golearn-backend
    runtime: image
    region: oregon
    plan: free
    image:
      url: node:18
    buildCommand: |
      apt-get update -qq && apt-get install -y -qq golang-go
      cd backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001